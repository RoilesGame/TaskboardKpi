<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таскборд</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="layout">
    <!-- Боковая панель -->
    <aside class="sidebar">
        <div class="profile">
            <div class="avatar" id="user-avatar">?</div>
            <span class="user-name" id="user-name">Загрузка...</span>
        </div>
        <div class="teams-section">
            <h3>Команды</h3>
            <ul id="teams-list" class="teams-list">
                <!-- Заполнится через JS -->
            </ul>
        </div>

        <button id="create-team-btn" class="btn-secondary" style="width:100%; margin-bottom:8px;">+ Создать команду</button>
        
        <nav class="sidebar-actions">
            <button id="new-task-btn" class="btn-primary">Новая задача</button>
            <button id="logout-btn" class="btn-secondary">Выйти</button>
        </nav>
    </aside>

    <!-- Основной контент -->
    <main class="board">
        <div class="column" data-status="backlog">
            <div class="column-header">
                <h2>Бэклог</h2>
                <span class="task-count" id="backlog-count">0</span>
            </div>
            <div class="task-list" id="backlog"></div>
        </div>
        <div class="column" data-status="in_progress">
            <div class="column-header">
                <h2>В работе</h2>
                <span class="task-count" id="in_progress-count">0</span>
            </div>
            <div class="task-list" id="in_progress"></div>
        </div>
        <div class="column" data-status="review">
            <div class="column-header">
                <h2>Ревью</h2>
                <span class="task-count" id="review-count">0</span>
            </div>
            <div class="task-list" id="review"></div>
        </div>
        <div class="column" data-status="done">
            <div class="column-header">
                <h2>Готово</h2>
                <span class="task-count" id="done-count">0</span>
            </div>
            <div class="task-list" id="done"></div>
        </div>
    </main>
</div>

<!-- Модальное окно создания задачи -->
<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
        <h3>Новая задача</h3>
        <form id="create-task-form">
            <label>Название</label>
            <input type="text" id="task-title" required>
            <label>Описание</label>
            <textarea id="task-desc" rows="3"></textarea>
            <label>Приоритет</label>
            <select id="task-priority">
                <option value="low">Низкий</option>
                <option value="medium" selected>Средний</option>
                <option value="high">Высокий</option>
                <option value="critical">Критический</option>
            </select>
            <div class="modal-actions">
                <button type="submit">Создать</button>
                <button type="button" id="close-modal">Отмена</button>
            </div>
        </form>
    </div>
</div>

<!-- Модальное окно создания команды -->
<div id="team-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
        <h3>Создать команду</h3>
        <form id="create-team-form">
            <label>Название команды</label>
            <input type="text" id="team-name" required>
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" id="allow-edit">
                <span>Разрешить участникам создавать и редактировать задачи</span>
            </label>
            <div class="modal-actions">
                <button type="submit">Создать</button>
                <button type="button" id="close-team-modal">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="board.js"></script>
</body>
</html>
